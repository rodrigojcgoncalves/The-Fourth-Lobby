<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details - The Fourth Lobby</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="dark">
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">4L</div>
        <span class="logo-text">The Fourth Lobby</span>
      </a>

      <form class="search-container" data-action="search">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" name="search" placeholder="Search events, artists..." />
        </div>
      </form>

      <div class="nav-links">
        <a href="tickets.html" class="nav-link" data-nav="tickets">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 7.5l9-4.5 9 4.5M2 7.5l9 4.5 9-4.5M2 7.5v9l9 4.5 9-4.5v-9"></path>
          </svg>
          Tickets
        </a>
        <a href="promoter.html" class="nav-link" data-nav="promoter">Promoter</a>
        <a href="organizer.html" class="nav-link" data-nav="organizer">Organizer</a>
        <button class="btn-login" data-action="login">Login</button>
        <a href="#logout" class="nav-link hidden" data-nav="logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </header>

  <main class="dark">
    <!-- Hero Image will be set by JavaScript -->
    <div id="eventBanner" class="event-hero"></div>

    <div class="container">
      <div class="event-content">
        <!-- Main Content -->
        <div class="event-main">
          <!-- Event Header -->
          <div class="card">
            <div class="card-content">
              <h1 id="eventTitle">Event Title</h1>
              <div class="event-info">
                <div class="info-item">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                  <span id="eventDate">April 15, 2026</span>
                </div>
                <div class="info-item">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                  <span id="eventLocation">Warehouse District, Porto</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="card event-description">
            <div class="card-content">
              <h2>About This Event</h2>
              <p id="eventDescription">Event description goes here</p>
            </div>
          </div>

          <!-- Artist Lineup -->
          <div class="card">
            <div class="card-content">
              <h2>Artist Lineup</h2>
              <div class="artist-lineup"></div>
            </div>
          </div>
        </div>

        <!-- Sidebar with Tickets -->
        <div class="ticket-sidebar">
          <div class="card">
            <div class="card-content">
              <h3>Tickets</h3>
              <div class="ticket-phases"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Purchase Modal -->
  <div class="modal-overlay" id="purchaseModal">
    <div class="modal">
      <h2 class="modal-title">✓ Purchase Successful</h2>
      <div class="modal-content">Your ticket has been purchased! Check your email for details.</div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <h2 class="modal-title">Login</h2>
      <form id="loginForm">
        <div style="margin-bottom: 1.5rem; text-align: left;">
          <label style="display: block; margin-bottom: 0.5rem; color: var(--muted-foreground);">Account Type:</label>
          <div style="display: flex; gap: 1rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="loginType" value="customer" checked />
              Customer
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="loginType" value="promoter" />
              Promoter
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="loginType" value="organizer" />
              Organizer
            </label>
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-confirm">Login</button>
          <button type="button" class="btn-cancel" data-action="close-modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../JS/data.js"></script>
  <script src="../JS/app.js"></script>
  <script>
    // Event detail specific initialization
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const eventId = urlParams.get("id");

      if (!eventId) {
        window.location.href = "index.html";
        return;
      }

      const event = mockEvents.find((e) => e.id === eventId);
      if (!event) {
        document.body.innerHTML = `
          <div class="container" style="padding: 4rem 0; text-align: center;">
            <h2>Event Not Found</h2>
            <button class="btn-primary" onclick="window.location.href='index.html'" style="margin-top: 1rem;">Back to Homepage</button>
          </div>
        `;
        return;
      }

      // Set hero image
      document.getElementById("eventBanner").style.backgroundImage = `url('${event.image}')`;

      // Set event details
      document.getElementById("eventTitle").textContent = event.title;
      document.getElementById("eventDate").textContent = formatDate(event.date);
      document.getElementById("eventLocation").textContent = event.location;
      document.getElementById("eventDescription").textContent = event.description;

      // Render artist lineup
      const artistLineup = document.querySelector(".artist-lineup");
      const artistsHTML = event.lineup
        .map(
          (artist) => `
        <div class="artist-card">
          <div class="artist-image">
            <img src="${artist.image}" alt="${artist.name}" />
          </div>
          <div class="artist-info">
            <div class="artist-name">${artist.name}</div>
            <div class="artist-genre">${artist.genre}</div>
            <p class="artist-bio">${artist.bio}</p>
          </div>
        </div>
      `
        )
        .join("");
      artistLineup.innerHTML = artistsHTML;

      // Render ticket phases
      const ticketPhases = document.querySelector(".ticket-phases");
      if (event.ticketPhases.length > 0) {
        const phasesHTML = event.ticketPhases
          .map((phase) => {
            const isActive = phase.active && phase.available > 0;
            const phaseClass = isActive ? "active" : "phase-inactive";
            return `
          <div class="ticket-phase ${phaseClass}">
            <div class="phase-name">${phase.name}</div>
            <div class="phase-price">€${phase.price}</div>
            <div class="phase-available">Available: ${phase.available}/${phase.total}</div>
            <button class="btn-buy" ${!isActive ? "disabled" : ""} onclick="buyTicket('${event.id}', '${phase.id}')">
              ${phase.available === 0 ? "Sold Out" : isActive ? "Buy Now" : "Coming Soon"}
            </button>
          </div>
        `;
          })
          .join("");
        ticketPhases.innerHTML = phasesHTML;
      } else {
        ticketPhases.innerHTML = "<p class='text-muted'>No tickets available</p>";
      }
    });
  </script>
</body>
</html>
