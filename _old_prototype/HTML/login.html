<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar no Lobby - The Fourth Lobby</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="dark">
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">4L</div>
        <span class="logo-text">The Fourth Lobby</span>
      </a>
      <div style="flex: 1;"></div>
      <a href="index.html" class="nav-link">← Voltar</a>
    </div>
  </header>

  <main class="dark" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div class="login-container">
      <div class="card" style="max-width: 450px; width: 100%;">
        <div class="card-content">
          <!-- Header -->
          <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Bem-vindo ao Lobby</h1>
            <p class="text-muted">Entra na 4ª Dimensão</p>
          </div>

          <!-- Tabs -->
          <div class="login-tabs">
            <button class="login-tab active" data-tab="cliente">
              🎫 Cliente
            </button>
            <button class="login-tab" data-tab="promoter">
              📊 Promotor
            </button>
          </div>

          <!-- Form -->
          <form id="loginForm" class="login-form">
            <!-- Cliente Tab -->
            <div class="login-tab-content active" data-tab="cliente">
              <div class="form-group">
                <label for="email-cliente">Email</label>
                <input type="email" id="email-cliente" name="email" placeholder="teu@email.com" required />
              </div>

              <div class="form-group">
                <label for="password-cliente">Palavra-passe</label>
                <input type="password" id="password-cliente" name="password" placeholder="••••••••" required />
              </div>

              <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
                <input type="checkbox" id="remember-cliente" name="remember" />
                <label for="remember-cliente" style="margin: 0; cursor: pointer;">Lembrar-me</label>
              </div>
            </div>

            <!-- Promoter Tab -->
            <div class="login-tab-content" data-tab="promoter" style="display: none;">
              <div class="form-group">
                <label for="email-promo">Email</label>
                <input type="email" id="email-promo" name="email" placeholder="promoter@exemplo.com" required />
              </div>

              <div class="form-group">
                <label for="password-promo">Palavra-passe</label>
                <input type="password" id="password-promo" name="password" placeholder="••••••••" required />
              </div>

              <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
                <input type="checkbox" id="remember-promo" name="remember" />
                <label for="remember-promo" style="margin: 0; cursor: pointer;">Lembrar-me</label>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-login-submit">
              Entrar no Lobby
            </button>

            <!-- Link Forgot Password -->
            <div style="text-align: center; margin-top: 1rem;">
              <a href="#" style="font-size: 0.875rem; color: var(--neon-cyan);">Esqueceste a palavra-passe?</a>
            </div>
          </form>

          <!-- Register Link -->
          <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
            <p class="text-muted" style="margin-bottom: 0.5rem;">Primeira vez aqui?</p>
            <a href="#" style="color: var(--neon-magenta); font-weight: bold;">Cria a tua conta</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../JS/data.js"></script>
  <script src="../JS/app.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        // Remove active from all tabs and contents
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.login-tab-content').forEach(c => c.style.display = 'none');
        
        // Add active to clicked tab and show content
        tab.classList.add('active');
        document.querySelector(`[data-tab="${tabName}"]`).style.display = 'block';
      });
    });

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const activeTab = document.querySelector('.login-tab.active').dataset.tab;
      const email = document.querySelector('input[type="email"]:not(:disabled)').value;
      const role = activeTab === 'cliente' ? 'customer' : 'promoter';

      // Simulate login
      const mockUser = {
        id: `user-${Date.now()}`,
        name: email.split('@')[0],
        email: email,
        role: role,
      };

      currentUser = mockUser;
      localStorage.setItem('currentUser', JSON.stringify(mockUser));
      
      // Redirect
      window.location.href = role === 'customer' ? 'index.html' : 'promoter.html';
    });
  </script>
</body>
</html>
