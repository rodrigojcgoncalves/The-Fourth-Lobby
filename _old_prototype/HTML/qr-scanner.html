<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan de Bilhetes - The Fourth Lobby</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="dark">
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">4L</div>
        <span class="logo-text">The Fourth Lobby</span>
      </a>
      <div style="flex: 1;"></div>
      <a href="organizer.html" class="nav-link">Dashboard</a>
      <a href="#logout" class="nav-link" data-nav="logout">Logout</a>
    </div>
  </header>

  <main class="dark">
    <div class="qr-scanner-container">
      <h1>Scan de Bilhetes</h1>
      <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Digitaliza os bilhetes dos clientes à entrada</p>

      <div class="qr-viewfinder">
        <div class="viewfinder-corner top-left"></div>
        <div class="viewfinder-corner top-right"></div>
        <div class="viewfinder-corner bottom-left"></div>
        <div class="viewfinder-corner bottom-right"></div>

        <div class="scanner-line"></div>

        <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center;">
          <p style="color: var(--muted-foreground); font-size: 0.875rem;">Coloca o bilhete no enquadramento</p>
        </div>
      </div>

      <button id="startScanBtn" class="btn-start-scan">
        Iniciar Scan
      </button>

      <!-- Stats -->
      <div class="scanner-stats">
        <div class="stat-item">
          <p>Bilhetes Validados</p>
          <p class="stat-value" id="validCount">0</p>
        </div>
        <div class="stat-item">
          <p>Evento</p>
          <p class="stat-value">DIMENSION IV</p>
        </div>
        <div class="stat-item">
          <p>Status</p>
          <p class="stat-value" id="statusText">Pronto</p>
        </div>
      </div>
    </div>

    <!-- Validation Toast -->
    <div id="validationToast" class="validation-toast">
      <div class="toast-content">
        <div class="toast-checkmark">✓</div>
        <div>
          <p class="toast-title">Bilhete Válido</p>
          <p class="toast-message" id="toastMessage">João Silva - 1ª Fase</p>
        </div>
      </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="validation-toast error">
      <div class="toast-content">
        <div class="toast-checkmark" style="color: var(--destructive);">✗</div>
        <div>
          <p class="toast-title" style="color: var(--destructive);">Bilhete Inválido</p>
          <p class="toast-message" style="color: var(--muted-foreground);" id="errorMessage">Bilhete já foi utilizado</p>
        </div>
      </div>
    </div>
  </main>

  <script src="../JS/data.js"></script>
  <script src="../JS/app.js"></script>
  <script>
    // QR Scanner simulation
    const startScanBtn = document.getElementById('startScanBtn');
    const validationToast = document.getElementById('validationToast');
    const errorToast = document.getElementById('errorToast');
    const toastMessage = document.getElementById('toastMessage');
    const statusText = document.getElementById('statusText');
    let validCount = 0;

    // Mock scanned tickets
    const mockScans = [
      { name: 'João Silva', phase: '1ª Fase' },
      { name: 'Maria Oliveira', phase: 'Early Entry' },
      { name: 'Pedro Costa', phase: '2ª Fase' },
      { name: 'Ana Santos', phase: '1ª Fase' },
      { name: 'Bilhete Duplicado', phase: 'INVÁLIDO' }
    ];

    let scanIndex = 0;
    let isScanning = false;

    startScanBtn.addEventListener('click', function() {
      if (!isScanning) {
        startScanning();
      }
    });

    function startScanning() {
      isScanning = true;
      startScanBtn.disabled = true;
      startScanBtn.textContent = 'Pausar Scan';
      statusText.textContent = 'Scanning...';

      // Simulate scanning every 3 seconds
      const scanInterval = setInterval(function() {
        if (scanIndex < mockScans.length) {
          simulateScan(mockScans[scanIndex]);
          scanIndex++;
        } else {
          // Restart from beginning
          scanIndex = 0;
        }
      }, 3000);

      // Store interval ID for stopping
      startScanBtn.dataset.intervalId = scanInterval;
    }

    function stopScanning() {
      isScanning = false;
      const intervalId = startScanBtn.dataset.intervalId;
      clearInterval(intervalId);
      startScanBtn.disabled = false;
      startScanBtn.textContent = 'Iniciar Scan';
      statusText.textContent = 'Pronto';
    }

    startScanBtn.addEventListener('click', function() {
      if (isScanning) {
        stopScanning();
      }
    });

    function simulateScan(ticketData) {
      // 20% chance of invalid
      const isValid = ticketData.phase !== 'INVÁLIDO' && Math.random() > 0.2;

      if (isValid) {
        showValidationToast(ticketData);
        validCount++;
        document.getElementById('validCount').textContent = validCount;
      } else {
        showErrorToast(ticketData);
      }

      // Visual feedback: glow effect
      const viewfinder = document.querySelector('.qr-viewfinder');
      viewfinder.style.boxShadow = isValid
        ? '0 0 40px rgba(34, 197, 94, 0.6), inset 0 0 40px rgba(34, 197, 94, 0.3)'
        : '0 0 40px rgba(212, 24, 61, 0.6), inset 0 0 40px rgba(212, 24, 61, 0.3)';

      setTimeout(() => {
        viewfinder.style.boxShadow = '0 0 30px rgba(0, 212, 255, 0.4), inset 0 0 30px rgba(0, 212, 255, 0.1)';
      }, 1000);
    }

    function showValidationToast(ticketData) {
      toastMessage.textContent = `${ticketData.name} - ${ticketData.phase}`;
      validationToast.style.display = 'flex';
      validationToast.classList.remove('hidden');

      setTimeout(() => {
        validationToast.classList.add('hidden');
        setTimeout(() => {
          validationToast.style.display = 'none';
        }, 300);
      }, 3000);
    }

    function showErrorToast(ticketData) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = ticketData.name === 'Bilhete Duplicado'
        ? 'Bilhete já foi utilizado neste evento'
        : 'Bilhete inválido ou expirado';

      errorToast.style.display = 'flex';
      errorToast.classList.remove('hidden');

      setTimeout(() => {
        errorToast.classList.add('hidden');
        setTimeout(() => {
          errorToast.style.display = 'none';
        }, 300);
      }, 3000);
    }
  </script>

  <style>
    .qr-scanner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 20, 40, 0.8) 100%);
    }

    .qr-scanner-container h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .qr-viewfinder {
      position: relative;
      width: 300px;
      height: 300px;
      border: 2px solid var(--neon-cyan);
      border-radius: var(--radius);
      margin: 2rem 0;
      background: rgba(0, 20, 40, 0.5);
      backdrop-filter: blur(5px);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), inset 0 0 30px rgba(0, 212, 255, 0.1);
      animation: viewfinderPulse 2s infinite;
    }

    @keyframes viewfinderPulse {
      0%, 100% {
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), inset 0 0 30px rgba(0, 212, 255, 0.1);
      }
      50% {
        box-shadow: 0 0 50px rgba(0, 212, 255, 0.6), inset 0 0 50px rgba(0, 212, 255, 0.2);
      }
    }

    .viewfinder-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid var(--neon-cyan);
    }

    .viewfinder-corner.top-left {
      top: -2px;
      left: -2px;
      border-right: none;
      border-bottom: none;
    }

    .viewfinder-corner.top-right {
      top: -2px;
      right: -2px;
      border-left: none;
      border-bottom: none;
    }

    .viewfinder-corner.bottom-left {
      bottom: -2px;
      left: -2px;
      border-top: none;
      border-right: none;
    }

    .viewfinder-corner.bottom-right {
      bottom: -2px;
      right: -2px;
      border-top: none;
      border-left: none;
    }

    .scanner-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      animation: scannerMove 2s infinite;
    }

    @keyframes scannerMove {
      0% { transform: translateY(-150px); }
      50% { transform: translateY(0); }
      100% { transform: translateY(150px); }
    }

    .btn-start-scan {
      width: 280px;
      padding: 1rem;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      color: black;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s ease;
      margin-bottom: 2rem;
    }

    .btn-start-scan:hover {
      opacity: 0.9;
    }

    .btn-start-scan:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .scanner-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }

    .stat-item {
      background: var(--card-background);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-item p:first-child {
      color: var(--muted-foreground);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 0.5rem 0;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: bold;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    /* Toast Notifications */
    .validation-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card-background);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: none;
      gap: 1rem;
      align-items: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: slideInUp 0.3s ease;
      z-index: 1000;
    }

    .validation-toast.error {
      border-color: rgba(212, 24, 61, 0.3);
    }

    .validation-toast.hidden {
      animation: slideOutDown 0.3s ease;
    }

    @keyframes slideInUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes slideOutDown {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(100%);
        opacity: 0;
      }
    }

    .toast-content {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .toast-checkmark {
      font-size: 1.5rem;
      color: #22c55e;
      font-weight: bold;
    }

    .toast-title {
      margin: 0 0 0.25rem 0;
      font-weight: bold;
      color: #22c55e;
    }

    .toast-message {
      margin: 0;
      color: var(--foreground);
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      .qr-viewfinder {
        width: 250px;
        height: 250px;
      }

      .btn-start-scan {
        width: 100%;
      }

      .scanner-stats {
        grid-template-columns: 1fr;
      }

      .validation-toast {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
      }
    }
  </style>
</body>
</html>
